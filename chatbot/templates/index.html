<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Run Chatbot</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <h1>Cloud Run <span class="highlight">Chatbot</span></h1>
            <p class="model-badge">{{ model }}</p>
        </header>
        <div class="chat-area" id="chatArea">
            <div class="message bot">
                <span class="label">bot</span>
                <p>Hi! I'm running on Cloud Run with Vertex AI. Ask me anything!</p>
            </div>
        </div>
        <form class="input-area" id="chatForm">
            <input type="text" id="userInput" placeholder="Type your message..." autocomplete="off" />
            <button type="submit" id="sendBtn">Send</button>
        </form>
    </div>
    <script>
        const chatArea = document.getElementById("chatArea");
        const chatForm = document.getElementById("chatForm");
        const userInput = document.getElementById("userInput");
        const sendBtn = document.getElementById("sendBtn");

        function addMessage(text, sender) {
            const div = document.createElement("div");
            div.className = `message ${sender}`;
            div.innerHTML = `<span class="label">${sender === "user" ? "you" : "bot"}</span><p>${text}</p>`;
            chatArea.appendChild(div);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        chatForm.addEventListener("submit", async (e) => {
            e.preventDefault();
            const message = userInput.value.trim();
            if (!message) return;

            addMessage(message, "user");
            userInput.value = "";
            sendBtn.disabled = true;
            sendBtn.textContent = "...";

            try {
                const res = await fetch("/chat", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ message }),
                });
                const data = await res.json();
                if (data.error) {
                    addMessage(`Error: ${data.error}`, "bot");
                } else {
                    addMessage(data.response, "bot");
                }
            } catch (err) {
                addMessage(`Error: ${err.message}`, "bot");
            } finally {
                sendBtn.disabled = false;
                sendBtn.textContent = "Send";
                userInput.focus();
            }
        });
    </script>
</body>
</html>
